services:
  hermes-api:
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile
    container_name: hermes-api
    command: python core/hermes_super_orchestrator.py
    environment:
      HERMES_API_HOST: 0.0.0.0
      HERMES_API_PORT: "8787"
      HERMES_GPU_TARGET_UTILIZATION: "0.75"
      HERMES_CPU_TARGET_UTILIZATION: "0.80"
      HERMES_API_KEY: "local-hermes-dev-key"
      HERMES_SINGLE_EXE_ENTRYPOINT: "hermes-gateway"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "aihub-unified-v1"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
      AIHUB_LLM_API_URL: "${AIHUB_LLM_API_URL:-}"
      AIHUB_LLM_API_KEY: "${AIHUB_LLM_API_KEY:-}"
      AIHUB_LLM_API_MODEL: "${AIHUB_LLM_API_MODEL:-aihub-unified-v1}"
    volumes:
      - ../../:/workspace
      - ../auto:/workspace/runtime/auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  hermes-gui:
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile
    container_name: hermes-gui
    command: streamlit run runtime/hermes/gui_dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      HERMES_API_BASE_URL: http://hermes-gateway:8788
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "aihub-unified-v1"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
    depends_on:
      - hermes-gateway
    ports:
      - "${HERMES_GUI_PORT:-8501}:8501"
    volumes:
      - ../../:/workspace
      - ../auto:/workspace/runtime/auto

  hermes-trainer:
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile
    container_name: hermes-trainer
    command: python runtime/hermes/auto_trainer.py
    environment:
      HERMES_API_BASE_URL: http://hermes-gateway:8788
      HERMES_TRAIN_SPECIALTY: fleet
      HERMES_TRAIN_STEPS: "500"
      HERMES_TRAIN_INTERVAL_SECONDS: "15"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "aihub-unified-v1"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
    depends_on:
      - hermes-gateway
    volumes:
      - ../../:/workspace
      - ../auto:/workspace/runtime/auto

  hermes-gateway:
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile.gateway
    container_name: hermes-gateway
    environment:
      HERMES_BACKEND_URL: http://hermes-api:8787
      HERMES_API_KEY: "local-hermes-dev-key"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "aihub-unified-v1"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
      AIHUB_LLM_API_URL: "${AIHUB_LLM_API_URL:-}"
      AIHUB_LLM_API_KEY: "${AIHUB_LLM_API_KEY:-}"
      AIHUB_LLM_API_MODEL: "${AIHUB_LLM_API_MODEL:-aihub-unified-v1}"
    depends_on:
      - hermes-api
    ports:
      - "${MCP_DOCKER_PORT:-8788}:8788"
