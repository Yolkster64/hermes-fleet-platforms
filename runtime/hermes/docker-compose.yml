services:
  hermes-api:
    image: "${HERMES_RUNTIME_IMAGE:-docker.io/yolkster1/dev_workflow:latest}"
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile
    container_name: hermes-api
    command: >
      sh -lc "if [ -f /workspace/core/native/hermes_learning_kernel.cpp ]; then
      g++ -O3 -std=c++17 -fPIC -shared /workspace/core/native/hermes_learning_kernel.cpp -o /workspace/core/native/hermes_learning_kernel.so;
      fi;
      python runtime/hermes/apps/bootstrap_volume_sql.py;
      python core/hermes_super_orchestrator.py"
    environment:
      HERMES_API_HOST: 0.0.0.0
      HERMES_API_PORT: "8787"
      HERMES_GPU_TARGET_UTILIZATION: "1.00"
      HERMES_CPU_TARGET_UTILIZATION: "1.00"
      HERMES_API_KEY: "local-hermes-dev-key"
      HERMES_CPP_NATIVE_LIB: "/workspace/core/native/hermes_learning_kernel.so"
      HERMES_LOW_BANDWIDTH_MODE: "true"
      HERMES_OFFLINE_ONLY: "false"
      HERMES_USER_ROUTED_INTERNET: "true"
      HERMES_MCP_SERVER: "github"
      HERMES_TELEMETRY_DB_PATH: "/workspace/runtime/hermes_persist/hermes_super_orchestrator.db"
      HERMES_VOLUME_DATA_PATH: "/workspace/runtime/hermes_persist"
      HERMES_TELEMETRY_PRUNE_INTERVAL_SECONDS: "15"
      HERMES_TELEMETRY_PRUNE_ON_START: "false"
      HERMES_SQLITE_BUSY_TIMEOUT_MS: "5000"
      HERMES_SQLITE_WRITE_RETRIES: "3"
      HERMES_SQLITE_WRITE_RETRY_DELAY_SECONDS: "0.03"
      HERMES_MAX_EXTERNAL_SIGNAL_BYTES: "65536"
      HERMES_MAX_AGENT_METRICS_ROWS: "25000"
      HERMES_MAX_ORCHESTRATOR_EVENTS_ROWS: "12000"
      HERMES_MAX_HORIZON_SCORES_ROWS: "12000"
      HERMES_MAX_LLM_RANKINGS_ROWS: "12000"
      HERMES_MAX_MEMORY_BANDS_ROWS: "6000"
      HERMES_MAX_EXTERNAL_SIGNALS_ROWS: "8000"
      HERMES_MAX_FLEET_RUN_ROWS: "8000"
      HERMES_MAX_DEDUPE_CANDIDATES_ROWS: "10000"
      HERMES_MAX_KNOWLEDGE_MESH_ROWS: "12000"
      HERMES_ORCHESTRATOR_STATE_PATH: "/workspace/runtime/hermes_persist/hermes_orchestrator_state.json"
      HERMES_ORCHESTRATOR_STATE_SAVE_SECONDS: "10"
      HERMES_FLEET_MODEL_LABEL: "hermes-fleet-newest"
      HERMES_SINGLE_EXE_ENTRYPOINT: "hermes-gateway"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "hermes-fleet-latest"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
    volumes:
      - ../../:/workspace
      - ../auto:/workspace/runtime/auto
      - hermes-data:/workspace/runtime/hermes_persist
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5).read()"]
      interval: 15s
      timeout: 6s
      retries: 8
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 30G
        reservations:
          memory: 10G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  hermes-gui:
    image: "${HERMES_RUNTIME_IMAGE:-docker.io/yolkster1/dev_workflow:latest}"
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile
    container_name: hermes-gui
    command: >
      sh -lc "python runtime/hermes/apps/bootstrap_volume_sql.py;
      streamlit run runtime/hermes/apps/gui_control_center.py --server.port 8501 --server.address 0.0.0.0"
    environment:
      HERMES_API_BASE_URL: http://hermes-gateway:8788
      HERMES_GUI_API_KEY: "local-hermes-ui-key"
      HERMES_LOW_BANDWIDTH_MODE: "true"
      HERMES_OFFLINE_ONLY: "false"
      HERMES_USER_ROUTED_INTERNET: "true"
      HERMES_MCP_SERVER: "github"
      HERMES_FLEET_MODEL_LABEL: "hermes-fleet-newest"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "hermes-fleet-latest"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    depends_on:
      hermes-gateway:
        condition: service_started
    ports:
      - "${HERMES_GUI_PORT:-8501}:8501"
    volumes:
      - ../../:/workspace
      - ../auto:/workspace/runtime/auto
      - hermes-data:/workspace/runtime/hermes_persist
    restart: always
    deploy:
      resources:
        limits:
          cpus: "24.0"
          memory: 3G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501', timeout=5).read()"]
      interval: 15s
      timeout: 6s
      retries: 8
      start_period: 25s

  hermes-trainer:
    image: "${HERMES_RUNTIME_IMAGE:-docker.io/yolkster1/dev_workflow:latest}"
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile
    container_name: hermes-trainer
    command: python runtime/hermes/apps/runtime_entrypoint.py --app trainer
    environment:
      HERMES_API_BASE_URL: http://hermes-gateway:8788
      HERMES_GATEWAY_KEY: "local-hermes-ui-key"
      HERMES_LOW_BANDWIDTH_MODE: "true"
      HERMES_OFFLINE_ONLY: "false"
      HERMES_USER_ROUTED_INTERNET: "true"
      HERMES_MCP_SERVER: "github"
      HERMES_TRAIN_SPECIALTY: fleet
      HERMES_TRAIN_STEPS: "2000"
      HERMES_TRAIN_INTERVAL_SECONDS: "6"
      HERMES_FLEET_OPTIMIZE_EVERY: "1"
      HERMES_FLEET_CANDIDATES: "500"
      HERMES_MAX_MODE: "true"
      HERMES_SMART_ACTIONS: "true"
      HERMES_ALWAYS_DEEP_LEARNING: "true"
      HERMES_SWARM_STRATEGY: "hybrid"
      HERMES_MICRO_AGENT_COUNT: "200"
      HERMES_GAUSSIAN_PRESSURE: "0.88"
      HERMES_PERMANENT_INTELLIGENCE: "true"
      HERMES_ENABLE_MOVIE_AIHUB: "true"
      HERMES_LEARNING_STATE_PATH: "/workspace/runtime/hermes_persist/hermes_learning_state.json"
      HERMES_VOLUME_DATA_PATH: "/workspace/runtime/hermes_persist"
      HERMES_FLEET_MODEL_LABEL: "hermes-fleet-newest"
      HERMES_SPECIALIST_MODES: "swarm,mesh,multipolar,specialist-mix"
      HERMES_AGENT_WORK_STYLES: "fast_micro,deep_specialist,balanced_hybrid"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "hermes-fleet-latest"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
    depends_on:
      hermes-gateway:
        condition: service_started
    volumes:
      - ../../:/workspace
      - ../auto:/workspace/runtime/auto
      - hermes-data:/workspace/runtime/hermes_persist
    restart: always
    deploy:
      resources:
        limits:
          memory: 30G
        reservations:
          memory: 10G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  hermes-gateway:
    image: "${HERMES_GATEWAY_IMAGE:-docker.io/yolkster1/dev_workflow-gateway:latest}"
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile.gateway
    container_name: hermes-gateway
    environment:
      HERMES_BACKEND_URL: http://hermes-api:8787
      HERMES_API_KEY: "local-hermes-dev-key"
      HERMES_GATEWAY_KEY: "local-hermes-ui-key"
      HERMES_LOW_BANDWIDTH_MODE: "true"
      HERMES_OFFLINE_ONLY: "false"
      HERMES_USER_ROUTED_INTERNET: "true"
      HERMES_MCP_SERVER: "github"
      HERMES_FLEET_MODEL_LABEL: "hermes-fleet-newest"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "hermes-fleet-latest"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
    depends_on:
      hermes-api:
        condition: service_healthy
    ports:
      - "${MCP_DOCKER_PORT:-8788}:8788"
    restart: always
    deploy:
      resources:
        limits:
          cpus: "24.0"
          memory: 3G
        reservations:
          memory: 1G

volumes:
  hermes-data:
