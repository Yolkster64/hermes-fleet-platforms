services:
  hermes-api:
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile
    container_name: hermes-api
    command: python core/hermes_super_orchestrator.py
    environment:
      HERMES_API_HOST: 0.0.0.0
      HERMES_API_PORT: "8787"
      HERMES_GPU_TARGET_UTILIZATION: "0.92"
      HERMES_CPU_TARGET_UTILIZATION: "0.95"
      HERMES_API_KEY: "local-hermes-dev-key"
      HERMES_SINGLE_EXE_ENTRYPOINT: "hermes-gateway"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "aihub-unified-v1"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
    volumes:
      - ../../:/workspace
      - ../auto:/workspace/runtime/auto
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5).read()"]
      interval: 15s
      timeout: 6s
      retries: 8
      start_period: 20s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  hermes-gui:
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile
    container_name: hermes-gui
    command: streamlit run runtime/hermes/gui_dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      HERMES_API_BASE_URL: http://hermes-gateway:8788
      HERMES_GUI_API_KEY: "local-hermes-ui-key"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "aihub-unified-v1"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    depends_on:
      hermes-gateway:
        condition: service_started
    ports:
      - "${HERMES_GUI_PORT:-8501}:8501"
    volumes:
      - ../../:/workspace
      - ../auto:/workspace/runtime/auto
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501', timeout=5).read()"]
      interval: 15s
      timeout: 6s
      retries: 8
      start_period: 25s

  hermes-trainer:
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile
    container_name: hermes-trainer
    command: python runtime/hermes/auto_trainer.py
    environment:
      HERMES_API_BASE_URL: http://hermes-gateway:8788
      HERMES_GATEWAY_KEY: "local-hermes-ui-key"
      HERMES_TRAIN_SPECIALTY: fleet
      HERMES_TRAIN_STEPS: "2000"
      HERMES_TRAIN_INTERVAL_SECONDS: "6"
      HERMES_FLEET_OPTIMIZE_EVERY: "1"
      HERMES_FLEET_CANDIDATES: "500"
      HERMES_MAX_MODE: "true"
      HERMES_SMART_ACTIONS: "true"
      HERMES_ALWAYS_DEEP_LEARNING: "true"
      HERMES_SWARM_STRATEGY: "hybrid"
      HERMES_MICRO_AGENT_COUNT: "200"
      HERMES_GAUSSIAN_PRESSURE: "0.88"
      HERMES_PERMANENT_INTELLIGENCE: "true"
      HERMES_SPECIALIST_MODES: "swarm,mesh,multipolar,specialist-mix"
      HERMES_AGENT_WORK_STYLES: "fast_micro,deep_specialist,balanced_hybrid"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "aihub-unified-v1"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
    depends_on:
      hermes-gateway:
        condition: service_started
    volumes:
      - ../../:/workspace
      - ../auto:/workspace/runtime/auto
    restart: unless-stopped

  hermes-gateway:
    build:
      context: ../..
      dockerfile: runtime/hermes/Dockerfile.gateway
    container_name: hermes-gateway
    environment:
      HERMES_BACKEND_URL: http://hermes-api:8787
      HERMES_API_KEY: "local-hermes-dev-key"
      HERMES_GATEWAY_KEY: "local-hermes-ui-key"
      AIHUB_UNIFIED_ENABLED: "true"
      AIHUB_SHARED_MODEL_ID: "aihub-unified-v1"
      AIHUB_SHARED_ML_PROFILE: "global-learning"
    depends_on:
      hermes-api:
        condition: service_healthy
    ports:
      - "${MCP_DOCKER_PORT:-8788}:8788"
    restart: unless-stopped
