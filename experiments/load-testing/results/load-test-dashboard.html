<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HELIOS Load Testing</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"><\/script>
<style>
body { font-family: Arial; background: #f0f0f0; margin: 0; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { color: #333; text-align: center; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
.chart-box { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
table { width: 100%; border-collapse: collapse; background: white; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
th { background: #f5f5f5; }
</style>
</head>
<body>
<div class="container">
<h1>HELIOS v4.0 Load Testing Results</h1>
<div class="grid">
<div class="chart-box">
<h2>Throughput</h2>
<canvas id="tput"><\/canvas>
</div>
<div class="chart-box">
<h2>p99 Latency</h2>
<canvas id="lat"><\/canvas>
</div>
<div class="chart-box">
<h2>Error Rate</h2>
<canvas id="err"><\/canvas>
</div>
</div>
<table>
<thead><tr><th>Load</th><th>Requests</th><th>Success</th><th>p99</th></tr></thead>
<tbody><tr><td>100</td><td>1739</td><td>99.14%</td><td>292ms</td></tr><tr><td>500</td><td>1836</td><td>98.64%</td><td>296ms</td></tr><tr><td>1000</td><td>7142</td><td>99.09%</td><td>296ms</td></tr><tr><td>5000</td><td>660</td><td>99.09%</td><td>284ms</td></tr></tbody>
</table>
</div>
<script>
new Chart(document.getElementById('tput'), {type:'line', data:{labels:[
  100,
  500,
  1000,
  5000
], datasets:[{label:'Throughput', data:[
  29,
  31,
  119,
  11
], borderColor:'blue', fill:false}]}});
new Chart(document.getElementById('lat'), {type:'line', data:{labels:[
  100,
  500,
  1000,
  5000
], datasets:[{label:'p99', data:[
  292,
  296,
  296,
  284
], borderColor:'red', fill:false}]}});
new Chart(document.getElementById('err'), {type:'bar', data:{labels:[
  100,
  500,
  1000,
  5000
], datasets:[{label:'Error Rate', data:[
  0.86,
  1.36,
  0.91,
  0.91
], backgroundColor:'orange'}]}});
</script>
</body>
</html>
