name: Code Quality & Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  powershell-lint:
    name: PowerShell Linting & Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up PowerShell
        uses: actions/setup-powershell@v4
        with:
          pwsh-version: latest
      
      - name: Install PSScriptAnalyzer
        run: |
          pwsh -Command "Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser"
      
      - name: Run PSScriptAnalyzer
        run: |
          pwsh -Command "
          \$scriptsFound = Get-ChildItem -Path './src', './scripts' -Recurse -Filter '*.ps1' -ErrorAction SilentlyContinue
          if (\$scriptsFound) {
            Invoke-ScriptAnalyzer -Path './src', './scripts' -Recurse -Severity Error, Warning -OutVariable results
            if (\$results) {
              \$results | Tee-Object -FilePath ps-analysis.txt
            }
          } else {
            Write-Host 'No PowerShell scripts found to analyze'
          }
          "
        continue-on-error: true
      
      - name: Upload Analysis
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: powershell-analysis
          path: ps-analysis.txt
          if-no-files-found: warn

  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Markdown Linter
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.json
        continue-on-error: true

  json-validate:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate JSON files
        run: |
          error_count=0
          find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" | while read file; do
            echo "Validating $file"
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "❌ Invalid JSON: $file"
              error_count=$((error_count + 1))
            fi
          done
          
          if [ $error_count -eq 0 ]; then
            echo "✅ All JSON files valid"
          else
            echo "⚠️  Found $error_count invalid JSON files (non-blocking)"
          fi
        continue-on-error: true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run security scan
        uses: github/super-linter/slim@v4
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_CSHARP: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
        continue-on-error: true

  quality-summary:
    name: Quality Check Summary
    if: always()
    needs: [powershell-lint, markdown-lint, json-validate, security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Report Status
        run: |
          echo "## Code Quality Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- PowerShell Lint: ${{ needs.powershell-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Markdown Lint: ${{ needs.markdown-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- JSON Validation: ${{ needs.json-validate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Quality checks completed"
