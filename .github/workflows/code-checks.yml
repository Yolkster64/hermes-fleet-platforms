name: Code Checks - HELIOS Platform v2

on:
  push:
    branches: [main, develop]
    paths:
      - '**.ps1'
      - '**.bat'
      - '**.cmd'
      - '.github/workflows/code-checks.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.ps1'
      - '**.bat'
      - '**.cmd'

jobs:
  code-checks:
    name: Automated Code Quality Checks
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup PowerShell 7
        run: |
          $ProgressPreference = "SilentlyContinue"
          choco install powershell-core -y
        shell: pwsh
      
      - name: Install Pester
        run: |
          Install-Module -Name Pester -RequiredVersion 5.4.0 -Force -SkipPublisherCheck
        shell: pwsh
      
      - name: PowerShell Syntax Validation
        id: syntax-check
        run: |
          Write-Host "╔════════════════════════════════════════╗"
          Write-Host "║  PowerShell Syntax Validation          ║"
          Write-Host "╚════════════════════════════════════════╝"
          
          $Files = Get-ChildItem -Recurse -Filter "*.ps1"
          $FailCount = 0
          
          foreach ($File in $Files) {
            try {
              $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $File.FullName), [ref]$null)
              Write-Host "✓ $($File.Name)"
            }
            catch {
              Write-Host "✗ $($File.Name): $($_.Exception.Message)"
              $FailCount++
            }
          }
          
          if ($FailCount -gt 0) {
            Write-Host ""
            Write-Host "❌ Syntax validation FAILED ($FailCount errors)"
            exit 1
          }
          else {
            Write-Host ""
            Write-Host "✓ All files have valid syntax"
          }
        shell: pwsh
      
      - name: Security Scanning
        id: security-scan
        run: |
          Write-Host "╔════════════════════════════════════════╗"
          Write-Host "║  Security Scanning                     ║"
          Write-Host "╚════════════════════════════════════════╝"
          
          $Files = Get-ChildItem -Recurse -Filter "*.ps1"
          $SecurityIssues = @()
          
          $PatternMap = @{
            'password\s*=\s*[''"][^''\"]*[''"]' = "Hardcoded password"
            'apikey\s*=\s*[''"][^''\"]*[''"]' = "Hardcoded API key"
            'secret\s*=\s*[''"][^''\"]*[''"]' = "Hardcoded secret"
            'token\s*=\s*[''"][^''\"]*[''"]' = "Hardcoded token"
          }
          
          foreach ($File in $Files) {
            $Content = Get-Content $File.FullName
            
            if ($File.Name -notmatch '^test-' -and $Content -notmatch '# EXAMPLE CODE') {
              foreach ($Pattern in $PatternMap.Keys) {
                if ($Content -match $Pattern) {
                  $SecurityIssues += @{
                    File = $File.Name
                    Issue = $PatternMap[$Pattern]
                    Pattern = $Pattern
                  }
                }
              }
            }
          }
          
          if ($SecurityIssues.Count -gt 0) {
            Write-Host "❌ Security issues found:"
            $SecurityIssues | ForEach-Object {
              Write-Host "  - [$($_.File)] $($_.Issue)"
            }
            exit 1
          }
          else {
            Write-Host "✓ No security issues detected"
          }
        shell: pwsh
      
      - name: Registry Modification Validation
        id: registry-check
        run: |
          Write-Host "╔════════════════════════════════════════╗"
          Write-Host "║  Registry Modification Validation      ║"
          Write-Host "╚════════════════════════════════════════╝"
          
          $Files = Get-ChildItem -Recurse -Filter "*.ps1"
          $IssueCount = 0
          
          foreach ($File in $Files) {
            $Content = Get-Content $File.FullName
            
            # Find registry modifications
            if ($Content -match '(New-Item|Set-ItemProperty|Remove-Item).*HKLM|HKCU|HKU') {
              # Check for documentation
              if ($Content -notmatch '# Registry:') {
                Write-Host "✗ $($File.Name): Missing '# Registry:' documentation"
                $IssueCount++
              }
              else {
                Write-Host "✓ $($File.Name): Registry changes documented"
              }
            }
          }
          
          if ($IssueCount -gt 0) {
            exit 1
          }
        shell: pwsh
      
      - name: File Path Validation
        id: path-check
        run: |
          Write-Host "╔════════════════════════════════════════╗"
          Write-Host "║  File Path Validation                  ║"
          Write-Host "╚════════════════════════════════════════╝"
          
          $Files = Get-ChildItem -Recurse -Filter "*.ps1"
          $PathIssues = @()
          
          foreach ($File in $Files) {
            $Content = Get-Content $File.FullName
            
            # Check for hardcoded paths without env variables
            if ($Content -match "['\"]C:\\Users\\[^'\"]*['\"]" -and 
                $File.Name -notmatch '^test-') {
              $PathIssues += "$($File.Name): Consider using environment variables"
            }
            
            # Check for invalid characters
            if ($Content -match "['\"].*[<>:|?*].*['\"]") {
              $PathIssues += "$($File.Name): Path contains invalid characters"
            }
          }
          
          if ($PathIssues.Count -gt 0) {
            Write-Host "⚠  Path warnings:"
            $PathIssues | ForEach-Object { Write-Host "  - $_" }
          }
          else {
            Write-Host "✓ File paths are valid"
          }
        shell: pwsh
      
      - name: Documentation Check
        id: doc-check
        run: |
          Write-Host "╔════════════════════════════════════════╗"
          Write-Host "║  Documentation Requirements            ║"
          Write-Host "╚════════════════════════════════════════╝"
          
          $PhaseFiles = Get-ChildItem -Recurse -Filter "Phase-*.ps1"
          $DocIssues = 0
          
          foreach ($File in $PhaseFiles) {
            $Content = Get-Content $File.FullName
            
            $HasHeader = $Content -match '<#'
            $HasSynopsis = $Content -match '\.SYNOPSIS'
            $HasDescription = $Content -match '\.DESCRIPTION'
            
            if ($HasHeader -and $HasSynopsis -and $HasDescription) {
              Write-Host "✓ $($File.Name): Documentation complete"
            }
            else {
              Write-Host "✗ $($File.Name): Missing documentation"
              $DocIssues++
            }
          }
          
          if ($DocIssues -gt 0) {
            Write-Host ""
            Write-Host "❌ $DocIssues files missing documentation"
            exit 1
          }
        shell: pwsh
      
      - name: Test Coverage Check
        id: coverage-check
        run: |
          Write-Host "╔════════════════════════════════════════╗"
          Write-Host "║  Test Coverage Requirements            ║"
          Write-Host "╚════════════════════════════════════════╝"
          
          $TestFiles = Get-ChildItem -Recurse -Filter "test-*.ps1"
          
          if ($TestFiles.Count -eq 0) {
            Write-Host "⚠  No test files found"
          }
          else {
            Write-Host "✓ Found $($TestFiles.Count) test files"
            
            foreach ($TestFile in $TestFiles) {
              Write-Host "  - $($TestFile.Name)"
            }
          }
        shell: pwsh
      
      - name: Run Unit Tests
        id: unit-tests
        continue-on-error: true
        run: |
          Write-Host "╔════════════════════════════════════════╗"
          Write-Host "║  Running Unit Tests                    ║"
          Write-Host "╚════════════════════════════════════════╝"
          
          $TestFiles = Get-ChildItem -Recurse -Filter "test-*-unit.ps1"
          
          if ($TestFiles.Count -eq 0) {
            Write-Host "ℹ  No unit tests found, skipping"
          }
          else {
            foreach ($TestFile in $TestFiles) {
              Write-Host ""
              Write-Host "Running $($TestFile.Name)..."
              
              $Result = Invoke-Pester -Path $TestFile.FullName -PassThru -ErrorAction SilentlyContinue
              
              if ($Result.FailedCount -gt 0) {
                Write-Host "❌ $($Result.FailedCount) test(s) failed"
                exit 1
              }
              else {
                Write-Host "✓ All tests passed"
              }
            }
          }
        shell: pwsh
      
      - name: Generate Report
        if: always()
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════╗"
          Write-Host "║  Code Checks Summary                   ║"
          Write-Host "╚════════════════════════════════════════╝"
          Write-Host ""
          Write-Host "✓ Syntax Validation: $(if ('${{ steps.syntax-check.outcome }}' -eq 'success') { 'PASS' } else { 'FAIL' })"
          Write-Host "✓ Security Scanning: $(if ('${{ steps.security-scan.outcome }}' -eq 'success') { 'PASS' } else { 'FAIL' })"
          Write-Host "✓ Registry Check: $(if ('${{ steps.registry-check.outcome }}' -eq 'success') { 'PASS' } else { 'FAIL' })"
          Write-Host "✓ Path Validation: $(if ('${{ steps.path-check.outcome }}' -eq 'success') { 'PASS' } else { 'FAIL' })"
          Write-Host "✓ Documentation: $(if ('${{ steps.doc-check.outcome }}' -eq 'success') { 'PASS' } else { 'FAIL' })"
          Write-Host ""
        shell: pwsh
      
      - name: Final Status
        if: failure()
        run: |
          Write-Host ""
          Write-Host "❌ Code checks FAILED"
          Write-Host ""
          Write-Host "Please fix the issues above before committing."
          exit 1
        shell: pwsh
      
      - name: Success Message
        if: success()
        run: |
          Write-Host ""
          Write-Host "✅ All code checks PASSED"
          Write-Host ""
          Write-Host "Your code is ready to merge!"
        shell: pwsh
