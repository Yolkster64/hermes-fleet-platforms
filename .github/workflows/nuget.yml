name: NuGet Package Build & Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  NUGET_FEED: https://api.nuget.org/v3/index.json
  NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
  PACKAGE_VERSION: 1.0.0

jobs:
  build:
    name: Build NuGet Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build package
        run: |
          Write-Host "📦 Building HELIOS NuGet Package v${{ env.PACKAGE_VERSION }}" -ForegroundColor Cyan
          dotnet build --configuration Release
          dotnet pack --configuration Release --output ./nupkg -p:PackageVersion=${{ env.PACKAGE_VERSION }}
          Write-Host "✅ Package built successfully" -ForegroundColor Green
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: nuget-package
          path: ./nupkg/

  publish:
    name: Publish to NuGet
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: nuget-package
      
      - name: Set up NuGet
        uses: actions/setup-dotnet@v4
      
      - name: Publish to NuGet.org
        run: |
          Write-Host "🚀 Publishing to NuGet.org..." -ForegroundColor Cyan
          dotnet nuget push "*.nupkg" --source ${{ env.NUGET_FEED }} --api-key ${{ env.NUGET_API_KEY }} --skip-duplicate
          Write-Host "✅ Published successfully" -ForegroundColor Green
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## HELIOS Platform Release
            
            **Version:** ${{ env.PACKAGE_VERSION }}
            **Date:** $(Get-Date)
            
            ### What's Included
            - Complete deployment automation
            - 6 agent fleet system
            - 12+ AI services integration
            - 8-layer security framework
            - Real-time monitoring dashboards
            
            ### Installation
            ```
            dotnet add package HELIOS.Platform --version ${{ env.PACKAGE_VERSION }}
            ```
          draft: false
          prerelease: false
