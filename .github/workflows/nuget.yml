name: NuGet Build & Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_nuget:
        description: 'Publish to NuGet.org'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['8.0', '7.0', '6.0']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build src/core/HELIOS.Platform/HELIOS.Platform.csproj -c Release -f net${{ matrix.dotnet-version }} --no-restore -v minimal

      - name: Run tests
        run: dotnet test src/tests/ -c Release --no-build --logger "trx;LogFileName=test-results.trx" --verbosity minimal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.dotnet-version }}
          path: '**/test-results.trx'

  package:
    needs: build
    runs-on: windows-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Get version
        id: version
        run: |
          [xml]$csproj = Get-Content "src/core/HELIOS.Platform/HELIOS.Platform.csproj"
          $version = $csproj.Project.PropertyGroup.Version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Package version: $version"

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet pack src/core/HELIOS.Platform/HELIOS.Platform.csproj -c Release -o artifacts/

      - name: Verify package
        run: |
          Get-ChildItem artifacts/*.nupkg | ForEach-Object {
            Write-Host "Package created: $($_.Name)"
            Write-Host "Size: $(($_.Length / 1MB).ToString('F2')) MB"
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v3
        with:
          name: nuget-package-${{ steps.version.outputs.VERSION }}
          path: artifacts/*.nupkg
          retention-days: 30

  publish-nuget:
    needs: package
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download package
        uses: actions/download-artifact@v3
        with:
          path: download/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Publish to NuGet.org
        run: |
          $nupkgs = Get-ChildItem download -Recurse -Filter "*.nupkg"
          foreach ($nupkg in $nupkgs) {
            Write-Host "Publishing: $($nupkg.FullName)"
            dotnet nuget push "$($nupkg.FullName)" `
              --api-key "${{ secrets.NUGET_API_KEY }}" `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref_name }}
          body: |
            # HELIOS.Platform ${{ github.ref_name }}
            
            See [CHANGELOG.md](CHANGELOG.md) for release details.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  publish-github:
    needs: package
    runs-on: windows-latest
    if: always()

    steps:
      - name: Download package
        uses: actions/download-artifact@v3
        with:
          path: download/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Configure GitHub package source
        run: |
          dotnet nuget add source `
            --username github-actions `
            --password ${{ secrets.GITHUB_TOKEN }} `
            --store-password-in-clear-text `
            --name github `
            https://nuget.pkg.github.com/M0nado/index.json

      - name: Publish to GitHub Packages
        run: |
          $nupkgs = Get-ChildItem download -Recurse -Filter "*.nupkg"
          foreach ($nupkg in $nupkgs) {
            Write-Host "Publishing to GitHub: $($nupkg.FullName)"
            dotnet nuget push "$($nupkg.FullName)" `
              --source github `
              --skip-duplicate
          }
