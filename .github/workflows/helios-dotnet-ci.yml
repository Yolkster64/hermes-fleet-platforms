name: HELIOS .NET CI

on:
  push:
    branches:
      - main
      - develop
      - rescue/**
      - feature/**
      - copilot/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dotnet-core:
    name: Restore and build HELIOS core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: .NET info
        run: dotnet --info

      - name: Restore core platform
        run: dotnet restore src/core/HELIOS.Platform/HELIOS.Platform.csproj

      - name: Build core platform
        run: dotnet build src/core/HELIOS.Platform/HELIOS.Platform.csproj --configuration Release --no-restore

  dotnet-tests:
    name: Restore and run available tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests if primary test project exists
        shell: pwsh
        run: |
          $testProjects = @(
            'tests/HELIOS.Platform.Tests/HELIOS.Platform.Tests.csproj',
            'src/tests/HELIOS.Platform.Tests.csproj'
          )
          $found = $false
          foreach ($project in $testProjects) {
            if (Test-Path $project) {
              $found = $true
              dotnet restore $project
              dotnet test $project --configuration Release --no-restore --logger trx
            }
          }
          if (-not $found) {
            Write-Host 'No primary test project found yet. Skipping test execution.'
          }

  powershell-validation:
    name: Validate PowerShell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Analyze scripts
        shell: pwsh
        run: |
          $paths = @('scripts', 'tools', 'installer') | Where-Object { Test-Path $_ }
          if (-not $paths) {
            Write-Host 'No PowerShell script directories found.'
            exit 0
          }
          $scripts = Get-ChildItem -Path $paths -Recurse -Filter '*.ps1' -ErrorAction SilentlyContinue
          if (-not $scripts) {
            Write-Host 'No PowerShell scripts found.'
            exit 0
          }
          $results = $scripts | ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Severity Error }
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  json-config-validation:
    name: Validate JSON config files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON
        shell: pwsh
        run: |
          $jsonFiles = Get-ChildItem -Path . -Recurse -Filter '*.json' -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch '[\\/]bin[\\/]|[\\/]obj[\\/]|[\\/]node_modules[\\/]' }
          foreach ($file in $jsonFiles) {
            try {
              Get-Content $file.FullName -Raw | ConvertFrom-Json | Out-Null
              Write-Host "OK $($file.FullName)"
            } catch {
              Write-Error "Invalid JSON: $($file.FullName) - $($_.Exception.Message)"
              exit 1
            }
          }

  windows-gui-placeholder:
    name: Windows GUI/installer placeholder validation
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Detect Windows-only projects
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Path . -Recurse -Filter '*.csproj' | Where-Object {
            (Get-Content $_.FullName -Raw) -match 'net8.0-windows|UseWPF|UseWindowsForms|WinExe'
          }
          if (-not $projects) {
            Write-Host 'No Windows GUI projects detected yet.'
            exit 0
          }
          foreach ($project in $projects) {
            Write-Host "Detected Windows project: $($project.FullName)"
          }
          Write-Host 'Windows GUI builds will be enabled once the active GUI project is consolidated.'
