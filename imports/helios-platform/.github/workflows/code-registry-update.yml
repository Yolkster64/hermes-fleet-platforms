name: Code Registry Update

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'lib/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force registry update'
        required: false
        default: 'false'
      compression_level:
        description: 'Compression level (1-9)'
        required: false
        default: '6'

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  scan-code:
    name: Scan Code Snippets
    runs-on: ubuntu-latest
    outputs:
      snippets_count: ${{ steps.scan.outputs.count }}
      registry_hash: ${{ steps.scan.outputs.hash }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Scan Code Snippets
        id: scan
        run: |
          echo "Scanning for code snippets..."
          
          # Find all source files
          FILES=$(find src lib modules -type f \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \) 2>/dev/null | wc -l)
          echo "count=$FILES" >> $GITHUB_OUTPUT
          
          # Calculate registry hash
          HASH=$(find src lib modules -type f \( -name "*.js" -o -name "*.ts" \) 2>/dev/null | xargs cat | md5sum | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          
          echo "Found $FILES source files"
          echo "Registry hash: $HASH"

      - name: Create Snippet Index
        run: |
          mkdir -p .registry
          cat > .registry/index.json << 'EOF'
          {
            "version": "1.0",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "snippets": [],
            "metadata": {
              "total_count": 0,
              "compressed_size": 0,
              "compression_ratio": 0
            }
          }
          EOF

  extract-snippets:
    name: Extract Code Snippets
    runs-on: ubuntu-latest
    needs: scan-code
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Extraction Tools
        run: |
          pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Extract Snippets
        run: |
          mkdir -p .registry/snippets
          python << 'PYTHON_EOF'
          import os
          import json
          import hashlib
          from pathlib import Path
          
          snippets = []
          
          for root, dirs, files in os.walk('src'):
              for file in files:
                  if file.endswith(('.js', '.ts', '.jsx', '.tsx')):
                      filepath = os.path.join(root, file)
                      try:
                          with open(filepath, 'r', encoding='utf-8') as f:
                              content = f.read()
                              snippet = {
                                  'id': hashlib.md5(filepath.encode()).hexdigest()[:12],
                                  'path': filepath,
                                  'language': filepath.split('.')[-1],
                                  'size': len(content),
                                  'hash': hashlib.md5(content.encode()).hexdigest()
                              }
                              snippets.append(snippet)
                      except Exception as e:
                          print(f"Error processing {filepath}: {e}")
          
          with open('.registry/snippets.json', 'w') as f:
              json.dump(snippets, f, indent=2)
          
          print(f"Extracted {len(snippets)} snippets")
          PYTHON_EOF

      - name: Upload Snippet Registry
        uses: actions/upload-artifact@v3
        with:
          name: snippet-registry
          path: .registry/
          retention-days: 30

  compress-registry:
    name: Compress Registry
    runs-on: ubuntu-latest
    needs: extract-snippets
    steps:
      - name: Download Registry
        uses: actions/download-artifact@v3
        with:
          name: snippet-registry
          path: registry-work

      - name: Compress Registry
        run: |
          mkdir -p .registry-compressed
          COMPRESSION_LEVEL="${{ github.event.inputs.compression_level || '6' }}"
          
          # Create compressed archive
          tar -czf .registry-compressed/registry-$(date +%Y%m%d_%H%M%S).tar.gz registry-work/
          
          # Generate compressed index
          gzip -c registry-work/snippets.json > .registry-compressed/snippets.json.gz
          
          echo "Compression level: $COMPRESSION_LEVEL"
          echo "Original size: $(du -sh registry-work/ | cut -f1)"
          echo "Compressed size: $(du -sh .registry-compressed/ | cut -f1)"

      - name: Generate Compression Report
        run: |
          ORIGINAL=$(du -sb registry-work/ | cut -f1)
          COMPRESSED=$(du -sb .registry-compressed/ | cut -f1)
          RATIO=$(echo "scale=2; $ORIGINAL / $COMPRESSED" | bc)
          
          echo "## Registry Compression Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Original Size**: $(numfmt --to=iec-i --suffix=B $ORIGINAL)" >> $GITHUB_STEP_SUMMARY
          echo "**Compressed Size**: $(numfmt --to=iec-i --suffix=B $COMPRESSED)" >> $GITHUB_STEP_SUMMARY
          echo "**Compression Ratio**: ${RATIO}x" >> $GITHUB_STEP_SUMMARY

      - name: Upload Compressed Registry
        uses: actions/upload-artifact@v3
        with:
          name: registry-compressed
          path: .registry-compressed/
          retention-days: 30

  publish-registry:
    name: Publish Registry
    runs-on: ubuntu-latest
    needs: [scan-code, compress-registry]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Compressed Registry
        uses: actions/download-artifact@v3
        with:
          name: registry-compressed
          path: registry-dist

      - name: Create Registry Release
        run: |
          mkdir -p .registry
          cp -r registry-dist/* .registry/
          
          # Create registry metadata
          cat > .registry/registry-metadata.json << EOF
          {
            "version": "1.0",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "snippets_count": ${{ needs.scan-code.outputs.snippets_count }},
            "registry_hash": "${{ needs.scan-code.outputs.registry_hash }}",
            "build_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Update Registry Index
        run: |
          git config --global user.email "helios-registry@platform.local"
          git config --global user.name "HELIOS Registry Bot"
          git add .registry/
          git commit -m "chore: update code registry [skip ci]" || true
          git push origin HEAD:${{ github.ref }} || true

      - name: Generate Publish Report
        run: |
          echo "## Code Registry Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Snippets**: ${{ needs.scan-code.outputs.snippets_count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry Hash**: ${{ needs.scan-code.outputs.registry_hash }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY

  validate-registry:
    name: Validate Registry Integrity
    runs-on: ubuntu-latest
    needs: publish-registry
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Registry Files
        run: |
          echo "Verifying registry integrity..."
          
          if [ -d ".registry" ]; then
            echo "✓ Registry directory exists"
            find .registry -type f | while read file; do
              echo "  - $file"
            done
          else
            echo "✗ Registry directory not found"
            exit 1
          fi

      - name: Validate Registry Metadata
        run: |
          if [ -f ".registry/registry-metadata.json" ]; then
            jq . .registry/registry-metadata.json > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "✓ Registry metadata is valid JSON"
            else
              echo "✗ Registry metadata is invalid"
              exit 1
            fi
          fi

      - name: Report Registry Status
        run: |
          echo "Registry validation complete"
          echo "Status: Success"
