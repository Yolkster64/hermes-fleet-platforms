name: Component Analysis & Metrics

on:
  push:
    branches: [ main ]
    paths:
      - 'COMPONENT_ANALYSIS.md'
      - 'COMPONENT_METRICS.json'
      - '.github/workflows/analysis.yml'
  schedule:
    - cron: '0 0 * * 0'  # Weekly analysis

jobs:
  analyze:
    name: Analyze Components & Generate Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Validate Metrics JSON
        run: |
          python -c "
          import json
          with open('COMPONENT_METRICS.json') as f:
              data = json.load(f)
          print('✅ Metrics JSON valid')
          print(f\"  Components: {len(data.get('components', {}))}\"")
          print(f\"  Phases: {len(data.get('phases', {}))}\"")
          "
      
      - name: Generate Analysis Report
        run: |
          python -c "
          import json
          
          with open('COMPONENT_METRICS.json') as f:
              metrics = json.load(f)
          
          # Calculate totals
          total_time = sum(p.get('time', 0) for p in metrics.get('phases', {}).values())
          components = metrics.get('components', {})
          
          print('📊 HELIOS Component Analysis Report')
          print('=' * 50)
          print(f'Components Analyzed: {len(components)}')
          print(f'Total Deployment Time: {total_time} minutes')
          print(f'Performance Improvement: {metrics.get(\"metrics\", {}).get(\"performance\", {}).get(\"boot_time_reduction\", 0)}%')
          print(f'Security Layers: {metrics.get(\"metrics\", {}).get(\"security\", {}).get(\"layers\", 0)}')
          " > analysis-report.txt
      
      - name: Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: analysis-report
          path: analysis-report.txt
      
      - name: Comment on commit
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: '📊 Analysis metrics validated',
              tree: context.payload.pull_request?.head?.sha || context.sha
            })
