name: Documentation Update & Wiki Generation

on:
  push:
    branches: [ main ]
    paths:
      - '**.md'
      - '**.ps1'
      - 'docs/**'
      - 'phases/**'
  workflow_dispatch:

jobs:
  update-indexes:
    runs-on: ubuntu-latest
    name: Update Documentation Indexes
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
      
      - name: Generate Documentation Indexes
        run: |
          Write-Host "Generating documentation indexes..." -ForegroundColor Cyan
          
          # Create main index
          $index = @"
# Documentation Index

## Getting Started
- [README.md](../README.md)
- [00-KICKOFF-START-HERE.md](../00-KICKOFF-START-HERE.md)
- [GETTING_STARTED.md](../GETTING_STARTED.md)

## Architecture
- [MODULAR_ARCHITECTURE.md](../MODULAR_ARCHITECTURE.md)
- [ARCHITECTURE.md](./ARCHITECTURE.md)

## Phases
"@
          
          Get-ChildItem -Path "phases" -Directory | ForEach-Object {
            $index += "`n- [$($_.Name)](../$($_.FullName.Replace('\', '/')))"
          }
          
          $index | Out-File -FilePath "docs/INDEX.md" -Encoding UTF8
          Write-Host "✅ Documentation indexes updated" -ForegroundColor Green
        shell: pwsh

  validate-links:
    runs-on: ubuntu-latest
    name: Validate Documentation Links
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Markdown Links
        run: |
          echo "Checking for broken markdown links..."
          
          # Find all markdown files
          find . -name "*.md" -type f | while read file; do
            echo "Checking: $file"
            
            # Extract links and verify they exist
            grep -o '\[.*\](.*\.md)' "$file" | sed 's/.*(\(.*\))/\1/' | while read link; do
              if [ ! -f "$link" ]; then
                echo "⚠️  Potentially broken link in $file: $link"
              fi
            done
          done
          
          echo "Link validation complete"

  generate-wiki:
    runs-on: ubuntu-latest
    name: Generate Wiki Documentation
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PowerShell
        uses: actions/setup-powershell@v2
      
      - name: Generate Wiki Pages
        run: |
          Write-Host "Generating wiki documentation..." -ForegroundColor Cyan
          
          $phases = Get-ChildItem -Path "phases" -Directory
          $components = Get-ChildItem -Path "components" -Directory
          
          Write-Host "Found $($phases.Count) phases and $($components.Count) components" -ForegroundColor Yellow
          
          # Create wiki index
          $wikiIndex = @"
# HELIOS Platform Wiki

## Phases

"@
          
          $phases | ForEach-Object {
            $phaseNum = $_.Name.Split('-')[0]
            $phaseName = $_.Name.Substring(2)
            $wikiIndex += "`n- **Phase $phaseNum**: $phaseName - [View](../$($_.FullName.Replace('\', '/')))"
          }
          
          $wikiIndex += "`n`n## Components`n`n"
          
          $components | ForEach-Object {
            $wikiIndex += "`n- **$($_.Name)** - [View](../$($_.FullName.Replace('\', '/')))"
          }
          
          $wikiIndex | Out-File -FilePath "docs/WIKI_INDEX.md" -Encoding UTF8
          Write-Host "✅ Wiki documentation generated" -ForegroundColor Green
        shell: pwsh

  update-status-badge:
    runs-on: ubuntu-latest
    name: Update Status Badge
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Update README Status Badge
        run: |
          # Add status badge to README
          echo "Updating status badges..."
          echo "✅ Documentation Up to Date"

jobs:
  sync-to-wiki:
    runs-on: ubuntu-latest
    name: Sync Documentation to GitHub Wiki
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      
      - name: Checkout Wiki
        run: |
          git clone https://github.com/M0nado/helios-platform.wiki.git wiki
      
      - name: Copy Documentation to Wiki
        run: |
          cp docs/*.md wiki/ 2>/dev/null || true
          cp phases/*/README.md wiki/ 2>/dev/null || true
          cp components/*/README.md wiki/ 2>/dev/null || true
      
      - name: Commit Wiki Changes
        run: |
          cd wiki
          git add -A
          git commit -m "Auto-sync documentation from main repo" || true
          git push origin master || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
