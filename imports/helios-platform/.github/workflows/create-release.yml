name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: '1.0.0'
      dry_run:
        description: 'Perform a dry run'
        required: false
        default: false
        type: boolean

jobs:
  create-release:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set version
      id: version
      shell: powershell
      run: |
        if ('${{ github.ref }}' -match 'refs/tags/v(.+)$') {
          $version = $matches[1]
        } else {
          $version = '${{ github.event.inputs.version }}'
        }
        Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build and prepare distribution
      shell: powershell
      run: |
        .\scripts\deployment\prepare-distribution.ps1 `
          -Version '${{ steps.version.outputs.VERSION }}' `
          -OutputPath 'dist'

    - name: Verify distribution
      shell: powershell
      run: |
        .\scripts\deployment\verify-distribution.ps1 `
          -DistributionPath 'dist' `
          -Version '${{ steps.version.outputs.VERSION }}'

    - name: Create GitHub release
      shell: powershell
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $dryRunFlag = if ('${{ github.event.inputs.dry_run }}' -eq 'true') { '-DryRun' } else { '' }
        
        .\scripts\deployment\create-release.ps1 `
          -Version '${{ steps.version.outputs.VERSION }}' `
          -DistributionPath 'dist' `
          -GitHubToken '${{ secrets.GITHUB_TOKEN }}' `
          -ChangelogPath 'RELEASE_NOTES.md' `
          $dryRunFlag

    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ steps.version.outputs.VERSION }}
        path: dist/v${{ steps.version.outputs.VERSION }}/
        retention-days: 90

    - name: Publish release summary
      if: always()
      shell: powershell
      run: |
        $version = '${{ steps.version.outputs.VERSION }}'
        Write-Host "::group::Release Summary"
        Write-Host "Version: v$version"
        Write-Host "Status: ${{ job.status }}"
        Write-Host "Repository: ${{ github.repository }}"
        Write-Host "Ref: ${{ github.ref }}"
        Write-Host "::endgroup::"
