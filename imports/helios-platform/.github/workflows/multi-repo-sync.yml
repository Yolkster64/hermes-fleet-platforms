name: Multi-Repo Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  push:
    branches:
      - main
      - develop
    paths:
      - '.gitmodules'
      - '.github/workflows/multi-repo-sync.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-submodules:
    name: Sync Submodules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Submodules
        run: |
          git config --global user.email "helios-bot@platform.local"
          git config --global user.name "HELIOS Platform Bot"
          git submodule update --init --recursive --remote
          git submodule foreach --recursive "git fetch origin"

      - name: Check Submodule Status
        id: check-status
        run: |
          echo "Status Report:"
          git submodule foreach 'echo "=== $name ===" && git status && git log --oneline -1'
          STATUS_OUTPUT=$(git diff --name-only HEAD)
          echo "changes_detected=$([[ -n "$STATUS_OUTPUT" ]] && echo "true" || echo "false")" >> $GITHUB_OUTPUT

      - name: Commit Changes
        if: steps.check-status.outputs.changes_detected == 'true'
        run: |
          git add -A
          git commit -m "chore: sync submodules to latest remote versions"
          git push origin HEAD:${{ github.ref }}

      - name: Create Pull Request
        if: steps.check-status.outputs.changes_detected == 'true' && github.ref == 'refs/heads/develop'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: sync submodules to latest versions"
          title: "[SYNC] Submodule Updates"
          body: |
            ## Submodule Synchronization
            
            This PR updates all submodules to their latest remote versions.
            
            ### Changes:
            ```
            ${{ steps.check-status.outputs.changes_detected }}
            ```
            
            - [ ] Review submodule changes
            - [ ] Verify component compatibility
            - [ ] Run integration tests
          branch: sync/submodules-${{ github.run_number }}
          delete-branch: true
          labels: |
            chore
            automated

      - name: Report Sync Status
        run: |
          echo "## Multi-Repo Sync Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "**Changes Detected**: ${{ steps.check-status.outputs.changes_detected }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Submodule Status" >> $GITHUB_STEP_SUMMARY
          echo "$(git submodule foreach 'echo "- $name"')" >> $GITHUB_STEP_SUMMARY

  validate-sync:
    name: Validate Sync Integrity
    runs-on: ubuntu-latest
    needs: sync-submodules
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Verify Submodule Hashes
        run: |
          echo "Verifying submodule integrity..."
          git submodule foreach 'echo "Submodule: $name" && git rev-parse HEAD'

      - name: Check for Conflicts
        run: |
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "ERROR: Merge conflicts detected in submodules"
            exit 1
          fi
          echo "✓ No conflicts detected"

      - name: Validate .gitmodules
        run: |
          if git config -f .gitmodules --get-regexp path | wc -l | grep -q .; then
            echo "✓ .gitmodules is valid"
          else
            echo "ERROR: .gitmodules validation failed"
            exit 1
          fi
